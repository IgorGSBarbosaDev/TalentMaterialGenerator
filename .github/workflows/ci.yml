name: CI - USI Generator

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Architecture
        run: python scripts/check_architecture.py

      - name: Black
        run: python -m black --check app tests

      - name: Flake8
        run: python -m flake8 app tests --max-line-length=100 --extend-ignore=E203,W503

      - name: Mypy
        run: python -m mypy app --ignore-missing-imports --python-version=3.11 --no-error-summary

      - name: Pytest
        run: python -m pytest -q
